{% extends "base.html" %}
{% block content %}
<div class="fade-in">
    <h2><i class="fas fa-chart-line"></i> Admin Dashboard</h2>
    <p class="text-muted">Welcome, {{ current_user.username }}!</p>
    
    <div class="row mt-4">
        <div class="col-md-4">
            <div class="card bg-primary text-white">
                <div class="card-body">
                    <h5><i class="fas fa-comments"></i> Total Chats</h5>
                    <h2>{{ total_chats }}</h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-success text-white">
                <div class="card-body">
                    <h5><i class="fas fa-users"></i> Active Users</h5>
                    <h2>{{ total_users }}</h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-warning text-white">
                <div class="card-body">
                    <h5><i class="fas fa-exclamation-triangle"></i> Escalations</h5>
                    <h2>{{ total_escalations }}</h2>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
